<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gaming Zone</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#050505;
      color:white;
      overflow-x:hidden;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 50px;
      background:#000;
      border-bottom:2px solid #00ffff;
      box-shadow:0 0 20px #00ffff;
      position:sticky;
      top:0;
    }

    header h1{
      color:#00ffff;
      text-shadow:0 0 15px #00ffff;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:25px;
      transition:0.3s;
      font-weight:bold;
    }

    nav a:hover{
      color:#00ffff;
      text-shadow:0 0 10px #00ffff;
    }

    .hero{
      height:100vh;

      background:
      linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
      url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1400') center/cover;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero h2{
      font-size:80px;
      color:#00ffff;
      text-shadow:0 0 20px #00ffff;
      margin-bottom:20px;
    }

    .hero p{
      font-size:24px;
      margin-bottom:40px;
    }

    .btn{
      padding:18px 40px;
      background:#00ffff;
      color:black;
      text-decoration:none;
      border-radius:15px;
      font-size:18px;
      font-weight:bold;
      box-shadow:0 0 20px #00ffff;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.1);
      background:white;
    }

    .section{
      padding:100px 20px;
      text-align:center;
    }

    .section h2{
      font-size:45px;
      color:#00ffff;
      margin-bottom:50px;
      text-shadow:0 0 15px #00ffff;
    }

    .cards{
      display:flex;
      justify-content:center;
      gap:30px;
      flex-wrap:wrap;
    }

    .card{
      width:300px;
      background:#111;
      border:2px solid #00ffff;
      border-radius:20px;
      overflow:hidden;
      transition:0.3s;
      box-shadow:0 0 20px rgba(0,255,255,0.4);
    }

    .card:hover{
      transform:translateY(-15px);
      box-shadow:0 0 30px #00ffff;
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card h3{
      margin:20px 0 10px;
      color:#00ffff;
    }

    .card p{
      padding:0 20px 20px;
    }

    footer{
      background:#000;
      text-align:center;
      padding:30px;
      border-top:2px solid #00ffff;
      margin-top:50px;
    }

  </style>
</head>

<body>

<header>

  <h1>GAMING ZONE</h1>

  <nav>
    <a href="#">Home</a>
    <a href="#">Games</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
  </nav>

</header>

<section class="hero">

  <h2>WELCOME GAMER</h2>

  <p>
    최고의 게임 세계에 오신 것을 환영합니다
  </p>

  <a href="#" class="btn">
    START GAME
  </a>

</section>

<section class="section">

  <h2>POPULAR GAMES</h2>

  <div class="cards">

    <div class="card">

      <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200">

      <h3>Counter Strike 2</h3>

      <p>
        세계적으로 유명한 FPS 게임
      </p>

    </div>

    <div class="card">

      <img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?q=80&w=1200">

      <h3>Valorant</h3>

      <p>
        전략과 팀워크가 중요한 슈팅 게임
      </p>

    </div>

    <div class="card">

      <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200">

      <h3>Cyber Gaming</h3>

      <p>
        미래 스타일의 게이밍 환경
      </p>

    </div>

  </div>

</section>

<footer>

  <p>
    2026 Gaming Zone | Bilguun
  </p>

</footer>

</body>
</html>
