<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Game Menu</title>

  <style>

    body{
      background:#000;
      color:white;
      font-family:Arial;
      text-align:center;
      padding:50px;
    }

    h1{
      color:cyan;
      font-size:60px;
      text-shadow:0 0 20px cyan;
      margin-bottom:40px;
    }

    .box{
      background:#111;
      width:300px;
      margin:20px auto;
      padding:30px;
      border:2px solid cyan;
      border-radius:20px;
      box-shadow:0 0 20px cyan;
    }

    a{
      display:inline-block;
      margin-top:30px;
      padding:15px 30px;
      background:cyan;
      color:black;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }

  </style>

</head>

<body>

<h1>GAME MENU</h1>

<div class="box">

  <h2>Counter Strike 2</h2>

  <p>
    최고의 FPS 게임
  </p>

</div>

<div class="box">

  <h2>Valorant</h2>

  <p>
    전략 슈팅 게임
  </p>

</div>

<a href="index.html">
  HOME
</a>

</body>
</html>
