<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Game Menu</title>

  <style>

    body{
      background:#000;
      color:white;
      font-family:Arial;
      text-align:center;
      padding:50px;
    }

    h1{
      color:cyan;
      font-size:60px;
      text-shadow:0 0 20px cyan;
      margin-bottom:50px;
    }

    .games{
      display:flex;
      justify-content:center;
      gap:40px;
      flex-wrap:wrap;
    }

    .box{
      background:#111;
      width:320px;
      border:2px solid cyan;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 0 20px cyan;
      transition:0.3s;
    }

    .box:hover{
      transform:translateY(-10px);
      box-shadow:0 0 30px cyan;
    }

    .box img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .box h2{
      color:cyan;
      margin:20px 0 10px;
    }

    .box p{
      padding:0 20px 20px;
    }

    a{
      display:inline-block;
      margin-top:40px;
      padding:15px 30px;
      background:cyan;
      color:black;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }

  </style>

</head>

<body>

<h1>GAME MENU</h1>

<div class="games">

  <div class="box">

    <a href="https://store.steampowered.com/app/730/CounterStrike_2/">
  <img src="https://images8.alphacoders.com/132/1329760.jpeg">
</a>

   <h2>Counter Strike 2</h2>

    <p>
      최고의 FPS 게임
    </p>

  </div>

  <div class="box">

   <a href="https://playvalorant.com/" target="_blank">
  <img src="https://wallpapers.com/images/hd/simple-red-valorant-logo-4izh3svwkekh6dxn.jpg">
</a>

    <h2>Valorant</h2>

    <p>
      전략 슈팅 게임
    </p>

  </div>

</div>

<a href="index.html">
  HOME
</a>

</body>
</html>
